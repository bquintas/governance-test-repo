name: Governance Guard

on:
  pull_request:
    branches: [main]
    paths:
      - '.kiro/**'
      - '.github/**'

jobs:
  governance-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for governance file changes
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const governanceFiles = files.filter(f => 
              f.filename.startsWith('.kiro/') || 
              f.filename.startsWith('.github/')
            );

            if (governanceFiles.length > 0) {
              const fileList = governanceFiles.map(f => `- \`${f.filename}\` (${f.status})`).join('\n');
              
              // Add label
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['governance-change']
              });

              // Post comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `## ⚠️ Governance File Changes Detected\n\nThis PR modifies governance files that control project standards and CI/CD:\n\n${fileList}\n\n**These changes require maintainer approval.** Please ensure changes are intentional and reviewed by a repo owner.\n\ncc @bquintas`
              });

              core.warning('Governance files modified — maintainer review required');
            } else {
              core.info('No governance files modified');
            }
